name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e

            echo "🔄 Pulling latest code..."
            cd /root/adultai-backup
            git fetch origin
            git reset --hard origin/main

            echo "🏗️  Building..."
            docker run --rm \
              --network dokploy-network \
              -v /root/adultai-backup:/app \
              -w /app \
              --env-file /root/adultai-backup/.env.production \
              node:24-alpine \
              sh -c "npm install -g pnpm && pnpm prisma generate && pnpm build"

            echo "♻️  Restarting service..."
            docker service update --force adultai-web

            echo "✅ Deployment complete!"
